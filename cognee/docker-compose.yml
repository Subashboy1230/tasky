# Run: cd cognee && docker compose up -d
#
# Reads env from ../.env.local so the sidecar shares tasky's Neo4j
# credentials + OpenAI key. Cognee's OPENAI_API_KEY is used for both
# extraction and embedding by default.

services:
  cognee:
    build: .
    container_name: tasky-cognee
    ports:
      - "8080:8080"
    env_file:
      - ../.env.local
    environment:
      # Point Cognee's graph provider at tasky's Neo4j Aura instance.
      # This is the win — both stores share one graph substrate.
      GRAPH_DATABASE_PROVIDER: neo4j
      GRAPH_DATABASE_URL: ${NEO4J_URI}
      GRAPH_DATABASE_USERNAME: ${NEO4J_USER}
      GRAPH_DATABASE_PASSWORD: ${NEO4J_PASSWORD}
      # Vector store — LanceDB is embedded (no extra service to run).
      VECTOR_DB_PROVIDER: lancedb
      # LLM — Cognee's default is OpenAI. Add OPENAI_API_KEY to
      # .env.local. If you don't have one, set LLM_PROVIDER=anthropic
      # + LLM_API_KEY=$ANTHROPIC_API_KEY instead.
    volumes:
      # Persist Cognee's local state (chunks, embeddings, config) across
      # container restarts.
      - cognee_data:/root/.cognee_system
    restart: unless-stopped

volumes:
  cognee_data:
